<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oprisa Hub - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --danger: #ef4444;
        }
        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
            color: var(--text-main);
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-container {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            text-align: center;
        }
        h1 { margin-top: 0; font-size: 28px; }
        p { color: var(--text-muted); margin-bottom: 24px; }
        input {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 16px;
            border-radius: 8px;
            border: 1px solid var(--card-border);
            background: rgba(0,0,0,0.2);
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            font-family: 'Outfit', sans-serif;
        }
        input:focus { border-color: var(--accent); }
        button {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            border: none;
            background: var(--accent);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 12px;
            font-family: 'Outfit', sans-serif;
        }
        button:hover { background: var(--accent-hover); }
        .toggle-btn {
            background: transparent;
            border: 1px solid var(--card-border);
        }
        .toggle-btn:hover { background: rgba(255,255,255,0.05); }
        .error { color: var(--danger); font-size: 14px; margin-bottom: 16px; display: none; }
        .success { color: #10b981; font-size: 14px; margin-bottom: 16px; display: none; }
    </style>
</head>
<body>
    <div class="auth-container">
        <h1 id="form-title">Login</h1>
        <p id="form-subtitle">Welcome back to Oprisa Hub</p>
        
        <div id="error-msg" class="error"></div>
        <div id="success-msg" class="success"></div>
        
        <form id="auth-form">
            <input type="email" id="email" placeholder="Email Address" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit" id="submit-btn">Sign In</button>
        </form>
        
        <button type="button" class="toggle-btn" id="toggle-btn">Create an Account</button>
    </div>

    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/auth.js?v=2"></script>
</body>
</html>
