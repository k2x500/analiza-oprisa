<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oprisa Hub - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0f172a;
            --sidebar-bg: #1e293b;
            --card-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --danger: #ef4444;
            --success: #10b981;
        }
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--card-border);
            display: flex;
            flex-direction: column;
            padding: 20px 0;
        }
        .logo {
            font-size: 20px;
            font-weight: 700;
            padding: 0 20px 20px;
            border-bottom: 1px solid var(--card-border);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
            text-decoration: none;
        }
        .nav-item {
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-muted);
            text-decoration: none;
            transition: 0.2s;
            cursor: pointer;
            border-left: 3px solid transparent;
        }
        .nav-item:hover, .nav-item.active {
            color: white;
            background: rgba(255,255,255,0.05);
        }
        .nav-item.active {
            border-left-color: var(--accent);
        }
        .user-info {
            margin-top: auto;
            padding: 20px;
            border-top: 1px solid var(--card-border);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .user-email { font-size: 14px; font-weight: 500; word-break: break-all; }
        .user-role { font-size: 12px; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; font-weight: 700;}
        .logout-btn {
            background: rgba(255,255,255,0.1);
            color: white;
            border: none;
            padding: 8px;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
            font-size: 13px;
        }
        .logout-btn:hover { background: rgba(255,255,255,0.2); }
        
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .admin-view {
            display: none;
            padding: 40px;
            overflow-y: auto;
            height: 100%;
            box-sizing: border-box;
        }
        .admin-view.active { display: block; }
        .iframe-view { display: none; height: 100%; }
        .iframe-view.active { display: block; }
        
        /* Admin Table */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: rgba(255,255,255,0.02); border-radius: 8px; overflow: hidden; border: 1px solid var(--card-border); }
        th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--card-border); font-size: 14px; }
        th { background: rgba(0,0,0,0.2); font-weight: 600; color: var(--text-muted); }
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: 600; }
        .status-pending { background: #f59e0b; color: #fff; }
        .status-approved { background: var(--success); color: #fff; }
        .status-rejected { background: var(--danger); color: #fff; }
        .online-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .online { background: var(--success); box-shadow: 0 0 8px var(--success); }
        .offline { background: var(--text-muted); }
        .action-btn { background: var(--accent); color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; margin-right: 6px; }
        .reject-btn { background: transparent; border: 1px solid var(--danger); color: var(--danger); }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="logo">
            <i class="fa-solid fa-bolt" style="color: #3b82f6;"></i> OPRISA HUB
        </div>
        
        <nav id="nav-menu">
            <a class="nav-item active" data-target="admin" id="nav-admin" style="display: none;">
                <i class="fa-solid fa-users-gear"></i> Admin Users
            </a>
            <a class="nav-item" data-target="crm">
                <i class="fa-solid fa-address-card"></i> CRM & Performance
            </a>
            <!-- Fleetcap opens in new tab as requested -->
            <a class="nav-item" href="fleetcap.html" target="_blank">
                <i class="fa-solid fa-chart-pie"></i> Fleetcap Dashboard <i class="fa-solid fa-external-link-alt" style="font-size: 10px; margin-left: auto;"></i>
            </a>
        </nav>
        
        <div class="user-info">
            <div class="user-email" id="user-email">...</div>
            <div class="user-role" id="user-role">...</div>
            <button class="logout-btn" id="logout-btn">Log Out</button>
        </div>
    </aside>
    
    <main class="main-content">
        <!-- Admin View -->
        <div class="admin-view active" id="view-admin">
            <h2>User Management</h2>
            <p style="color: var(--text-muted); margin-top: -10px; margin-bottom: 20px;">Manage worker access and view online presence.</p>
            <table>
                <thead>
                    <tr>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Status</th>
                        <th>Presence</th>
                        <th>Last Seen</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="users-table-body">
                    <!-- Loaded via JS -->
                </tbody>
            </table>
        </div>
        
        <!-- Iframe View -->
        <div class="iframe-view" id="view-crm">
            <iframe src="crm.html" id="crm-iframe"></iframe>
        </div>
    </main>

    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/dashboard.js"></script>
</body>
</html>
